<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雑談ガチャ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1814;
    --text-sub: #6b6760;
    --text-hint: #a09d99;
    --accent: #534AB7;
    --accent-dark: #3C3489;
    --accent-light: #EEEDFE;
    --accent-text: #3C3489;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.15);
    --radius: 16px;
    --radius-sm: 8px;
    --green: #1D9E75;
    --amber: #EF9F27;
    --red: #E24B4A;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18161c;
      --surface: #221f2a;
      --surface2: #2c2836;
      --text: #f0eef8;
      --text-sub: #a09ab8;
      --text-hint: #6b6680;
      --accent: #7b72d4;
      --accent-dark: #a49ae8;
      --accent-light: #26215C;
      --accent-text: #c4bef5;
      --border: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
    }
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
  }

  header { text-align: center; margin-bottom: 1.75rem; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.05em; }
  header p { font-size: 13px; color: var(--text-sub); margin-top: 6px; }

  /* チーム選択 */
  .team-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 0.75rem;
    width: 100%; max-width: 520px;
  }
  .team-label {
    font-size: 12px; font-weight: 700;
    color: var(--text-sub); letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .team-select {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: 5px 10px; cursor: pointer;
    flex: 1; max-width: 200px;
  }
  .new-team-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 0.75rem;
    width: 100%; max-width: 520px;
  }
  .team-input {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: 5px 10px; flex: 1; outline: none;
  }
  .team-input:focus { border-color: var(--accent); }

  /* ステータス */
  .status-bar {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--text-hint);
    margin-bottom: 1.25rem;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.loading { background: var(--amber); animation: blink 1s infinite; }
  .dot.error { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* テーマカード */
  .card {
    width: 100%; max-width: 520px; min-height: 190px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem 1.75rem;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.9rem; text-align: center;
    transition: opacity 0.2s, transform 0.2s;
    margin-bottom: 1.25rem;
  }
  .badge {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 14px; border-radius: 99px;
    background: var(--accent-light); color: var(--accent-text);
  }
  .card-theme { font-size: 18px; font-weight: 500; line-height: 1.65; }
  .card-desc { font-size: 13px; color: var(--text-sub); line-height: 1.6; }
  .card-hint {
    font-size: 12px; color: var(--text-hint);
    border-top: 1px solid var(--border);
    padding-top: 0.75rem; width: 100%;
    text-align: left; line-height: 1.6;
  }
  .card-empty { font-size: 14px; color: var(--text-hint); }

  /* ボタン */
  .actions {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 1.5rem;
    width: 100%; max-width: 520px;
  }
  .btn-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 0.8rem 2.5rem; border-radius: 99px;
    border: none; background: var(--accent); color: #fff;
    cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-main:hover { background: var(--accent-dark); }
  .btn-main:active { transform: scale(0.97); }
  .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-use {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 0.8rem 2rem; border-radius: 99px;
    border: none; background: var(--green); color: #fff;
    cursor: pointer; letter-spacing: 0.04em;
    transition: filter 0.15s, transform 0.1s;
  }
  .btn-use:hover { filter: brightness(1.1); }
  .btn-use:active { transform: scale(0.97); }
  .btn-use:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; padding: 0.6rem 1.2rem;
    border-radius: 99px;
    border: 1px solid var(--border-mid);
    background: transparent; color: var(--text-sub);
    cursor: pointer; transition: background 0.15s;
  }
  .btn-sub:hover { background: var(--surface2); }
  .btn-sub.success { color: var(--accent); border-color: var(--accent); }

  /* ルーレット */
  .roulette-section {
    width: 100%; max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .roulette-title {
    font-size: 12px; font-weight: 700;
    color: var(--text-hint); letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
  }
  .present-toggles {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 1.25rem; min-height: 34px;
    align-items: center;
  }
  .member-toggle-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border-mid);
    background: var(--surface2); color: var(--text-hint);
    cursor: pointer; transition: all 0.15s;
    text-decoration: line-through;
  }
  .member-toggle-btn.present {
    background: var(--accent-light); color: var(--accent-text);
    border-color: var(--accent);
    text-decoration: none;
  }
  .member-empty-hint {
    font-size: 12px; color: var(--text-hint);
  }
  .wheel-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 1rem;
  }
  .wheel-pointer-box {
    position: relative; width: 280px; height: 280px;
  }
  .wheel-pointer {
    position: absolute; top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 22px solid var(--red);
    z-index: 10; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
  }
  #wheelCanvas {
    border-radius: 50%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: block;
  }
  .wheel-result {
    font-size: 22px; font-weight: 700;
    color: var(--accent); min-height: 32px;
    text-align: center; letter-spacing: 0.03em;
  }
  .member-manage {
    margin-top: 1.25rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }
  .member-manage > summary {
    font-size: 12px; color: var(--text-hint);
    cursor: pointer; user-select: none; list-style: none;
    display: flex; align-items: center; gap: 4px;
  }
  .member-manage > summary::-webkit-details-marker { display: none; }
  .member-manage > summary::before { content: '▶'; font-size: 9px; }
  .member-manage[open] > summary::before { content: '▼'; }
  .member-list-items {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 10px 0; min-height: 28px; align-items: center;
  }
  .member-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--text-sub);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px 6px 3px 10px;
  }
  .member-item button {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); font-size: 15px; line-height: 1;
    padding: 0; transition: color 0.1s;
  }
  .member-item button:hover { color: var(--red); }
  .member-add-row {
    display: flex; gap: 8px; align-items: center;
    margin-top: 4px;
  }


  footer {
    margin-top: 3rem; font-size: 11px;
    color: var(--text-hint); text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>雑談ガチャ</h1>
  <p>オンラインMTGのアイスブレイクに。ボタンを押してテーマを引こう。</p>
</header>

<div class="team-bar">
  <span class="team-label">チーム</span>
  <select id="teamSelect" onchange="onTeamChange()" class="team-select">
    <option value="開発">開発</option>
  </select>
  <button class="btn-sub" onclick="toggleNewTeam()">＋ 追加</button>
  <button class="btn-sub" onclick="toggleRenameTeam()">✏️ 変更</button>
</div>
<div class="new-team-bar" id="newTeamBar" style="display:none;">
  <input type="text" id="newTeamInput" class="team-input" placeholder="新しいチーム名（例：営業、デザイン）">
  <button class="btn-sub" onclick="addNewTeam()">登録</button>
  <button class="btn-sub" onclick="toggleNewTeam()">キャンセル</button>
</div>
<div class="new-team-bar" id="renameTeamBar" style="display:none;">
  <input type="text" id="renameTeamInput" class="team-input" placeholder="新しいチーム名">
  <button class="btn-sub" onclick="confirmRenameTeam()">変更する</button>
  <button class="btn-sub" onclick="toggleRenameTeam()">キャンセル</button>
</div>

<div class="status-bar">
  <span class="dot loading" id="dot"></span>
  <span id="status-text">スプレッドシートに接続中...</span>
</div>

<div class="card" id="card">
  <div class="card-empty">ガチャを回してテーマを表示</div>
</div>

<div class="actions">
  <button class="btn-main" id="spinBtn" onclick="spin()" disabled>読み込み中...</button>
  <button class="btn-use" id="useBtn" onclick="useTheme()" style="display:none;">✅ 利用する</button>
  <button class="btn-sub" id="skipBtn" onclick="skipTheme()" style="display:none;">スキップ</button>
  <button class="btn-sub" id="copybtn" onclick="copyTheme()" style="display:none;">コピー</button>
</div>


<!-- ルーレット -->
<div class="roulette-section" id="rouletteSection" style="display:none;">
  <div class="roulette-title">誰から話す？</div>
  <div class="present-toggles" id="presentToggles"></div>
  <div class="wheel-wrap">
    <div class="wheel-pointer-box">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="280" height="280"></canvas>
    </div>
    <div class="wheel-result" id="wheelResult"></div>
    <button class="btn-use" id="spinWheelBtn" onclick="spinWheel()">🎡 ルーレットを回す</button>
  </div>
  <details class="member-manage">
    <summary>メンバー管理</summary>
    <div class="member-list-items" id="memberListItems"></div>
    <div class="member-add-row">
      <input type="text" id="memberAddInput" class="team-input" placeholder="名前を入力（例：田中、佐藤）">
      <button class="btn-sub" onclick="addMember()">追加</button>
    </div>
  </details>
</div>

<footer>スプレッドシートと連携してチーム全員で使用済みテーマを共有します</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzzZz1oUbzOkBy0EL15fpkI5TJT2ElJ90L86aygLm0JUtKZsulRxfH5F_h8ZAH_Kqhzpg/exec';

// 厳選テーマ（手書き・第1層）。これらを優先して出し、使い切ったら下の組み合わせ生成（第2層）に移る。
const themes = [
  { id: 0, category: "習慣・ルーティン", theme: "最近、仕事や日常で「これは便利だ」と感じたルーティンや習慣を教えてください。", desc: "朝のルーティン、仕事の段取りなど、意外なこだわりが見えてきます。", hint: "例：「毎朝コーヒーを淹れながら今日のタスクを整理する」など" },
  { id: 1, category: "ツール・ガジェット", theme: "最近いちばん「買ってよかった」と思っているガジェットやアイテムは何ですか？", desc: "仕事道具からプライベートグッズまで、価値観が垣間見えます。", hint: "例：「ノイズキャンセリングイヤホンを買ってから集中力が段違い」など" },
  { id: 2, category: "食べもの", theme: "最近ハマっている食べものや飲みものを教えてください。", desc: "グルメの話は距離感をぐっと縮めます。", hint: "例：「コンビニの新作にはまっています」など" },
  { id: 3, category: "インプット", theme: "最近読んだ本・見たドラマ・聴いたPodcastで、人に勧めたいものはありますか？", desc: "趣味や関心領域が自然と伝わります。", hint: "例：「〇〇というPodcastを通勤中に聴いています」など" },
  { id: 4, category: "休日の過ごし方", theme: "最近の休日で、いちばん「充電できた」と感じた過ごし方を教えてください。", desc: "リフレッシュ方法の違いが意外な盛り上がりを生みます。", hint: "例：「何もせず昼まで寝るのが最高のリセットです」など" },
  { id: 5, category: "マイブーム", theme: "今、個人的にちょっとハマっていることや興味を持ち始めたことを教えてください。", desc: "新しい趣味のきっかけが見つかることも。", hint: "例：「最近サウナにハマりだして毎週通っています」など" },
  { id: 6, category: "仕事の工夫", theme: "在宅ワークやオフィスワークで、自分だけの「集中するための工夫」を教えてください。", desc: "仕事術の違いから、互いのスタイルへの理解が深まります。", hint: "例：「あえてカフェで作業するとはかどります」など" },
  { id: 7, category: "今年チャレンジしたいこと", theme: "今年やってみたいこと・挑戦したいことを1つ教えてください。", desc: "目標を宣言することで、応援し合える関係に。", hint: "例：「フルマラソンに初挑戦しようと思っています」など" },
  { id: 8, category: "子どものころ", theme: "子どものころ夢中になっていた遊びや趣味を教えてください。", desc: "意外な共通点が見つかることも多いテーマです。", hint: "例：「ひたすらレゴを組み立てていました」など" },
  { id: 9, category: "旅・おでかけ", theme: "最近行ってよかった場所（国内外問わず）を教えてください。", desc: "旅の話は誰でも楽しく話せる鉄板テーマ。", hint: "例：「近場の温泉に日帰りで行ったら最高でした」など" },
  { id: 10, category: "季節の楽しみ", theme: "今の季節に関係した、個人的なお気に入りの楽しみ方を教えてください。", desc: "季節感のある話題はその場の空気をつくるのに最適です。", hint: "例：「秋になったら必ず焼き芋を食べるのが習慣です」など" },
  { id: 11, category: "アプリ・サービス", theme: "最近よく使っているアプリやWebサービスで、おすすめのものを教えてください。", desc: "便利ツールの共有はすぐ仕事や生活に活かせます。", hint: "例：「〇〇というアプリで家計管理が劇的に楽になりました」など" },
  { id: 12, category: "健康・運動", theme: "最近始めた（または気になっている）健康習慣や運動を教えてください。", desc: "運動・食事・睡眠改善など、健康への取り組みは話が尽きません。", hint: "例：「毎朝10分のストレッチを始めた」「水を1日2リットル飲むようにした」など" },
  { id: 13, category: "映画・ドラマ・アニメ", theme: "最近見て印象に残っている映画・ドラマ・アニメを教えてください。", desc: "エンタメの話は共通の話題が見つかりやすく盛り上がります。", hint: "例：「〇〇を見て主人公の考え方に影響を受けた」「何周も見ているお気に入りがある」など" },
  { id: 14, category: "音楽", theme: "最近よく聴いている音楽やアーティストを教えてください。", desc: "音楽の趣味は個性が出やすく、意外な共通点が見つかることも。", hint: "例：「作業中はずっと同じアルバムをリピートしている」「最近〇〇ジャンルにはまった」など" },
  { id: 15, category: "料理・食", theme: "最近作って美味しかった料理や、料理でこだわっていることを教えてください。", desc: "料理の工夫やレパートリーなど、意外な一面が見えることも。", hint: "例：「週末にまとめて作り置きをしている」「スパイスカレーにはまっている」など" },
  { id: 16, category: "ゲーム", theme: "最近ハマっているゲーム、または思い出のゲームを教えてください。", desc: "ゲームの話は世代を問わず盛り上がりやすいテーマです。", hint: "例：「スマホゲームで息抜きしている」「昔ハマったゲームを久しぶりに再プレイした」など" },
  { id: 17, category: "情報収集", theme: "ニュースや最新情報はどうやって収集していますか？おすすめの方法を教えてください。", desc: "SNS・アプリ・Podcast・YouTube、人それぞれの方法が聞けます。", hint: "例：「朝30分だけニュースアプリをチェックしている」「PodcastをBGMにしている」など" },
  { id: 18, category: "ペット・家族", theme: "ペットや家族の最近の出来事で、印象に残っていることはありますか？", desc: "プライベートな話を少し共有することで距離感が縮まります。", hint: "例：「子どもが最近急に言葉を覚えた」「猫が謎の行動をするようになった」など" },
  { id: 19, category: "ストレス解消", theme: "仕事でモヤモヤしたとき、どうやってリセットしていますか？", desc: "メンタルケアの方法や気分転換のコツが共有できます。", hint: "例：「散歩に出る」「好きな音楽を大音量でかける」「何も考えずに動画を見る」など" },
  { id: 20, category: "AI・テクノロジー", theme: "最近気になっているAIやIT技術、便利なツールを教えてください。", desc: "テクノロジーの最前線は開発チームならではの盛り上がりになります。", hint: "例：「ChatGPTを使い始めたら〇〇が効率化できた」「新しいサービスが気になっている」など" },
  { id: 21, category: "言葉・気づき", theme: "最近心に残った言葉や、ふとした気づきを教えてください。", desc: "本・SNS・会話など、どんな場面でも起きる「ハっとした瞬間」がテーマです。", hint: "例：「〇〇さんの一言で見方が変わった」「本に書いてあった言葉が刺さった」など" },
  { id: 22, category: "朝・夜の過ごし方", theme: "仕事が始まる前の朝、または仕事後の夜の時間の使い方を教えてください。", desc: "起床後や就寝前の過ごし方は個性が出やすいテーマです。", hint: "例：「朝は必ずニュースを見てから仕事を始める」「夜はYouTubeをダラ見して寝る」など" },
  { id: 23, category: "買い物・こだわり", theme: "「もっと早く使えばよかった！」と思ったアイテムやサービスを教えてください。", desc: "生活の質を上げるアイテム情報は参加者みんなの参考になります。", hint: "例：「食洗機を買ったら生活が変わった」「宅配クリーニングが便利すぎる」など" },

// 文字列から安定した整数IDを作る（スプシ記録・スキップ管理用の簡易ID）
function hashId(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = (h * 31 + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

// 第2層の全候補を生成（topics × frames）
function buildGeneratedThemes() {
  const out = [];
  for (const topic of GEN_TOPICS) {
    for (const f of GEN_FRAMES) {
      const theme = f.theme(topic);
      out.push({
        id: hashId(theme),
        category: topic,
        theme,
        desc: f.desc,
        hint: typeof f.hint === 'function' ? f.hint(topic) : f.hint,
      });
    }
  }
  return out;
}
const generatedThemes = buildGeneratedThemes();

// 使用済み・スキップ済みを除いた候補から1つ選ぶ。
// 1) 厳選テーマ → 2) 組み合わせ生成 → 3)（万一全部使用済みなら）全体からランダム
function pickLocalTheme() {
  const excluded = new Set([...usedHistory.map(h => h.theme), ...skippedThemes]);
  const fromCurated = themes.filter(t => !excluded.has(t.theme));
  if (fromCurated.length > 0) {
    return fromCurated[Math.floor(Math.random() * fromCurated.length)];
  }
  const fromGenerated = generatedThemes.filter(t => !excluded.has(t.theme));
  if (fromGenerated.length > 0) {
    return fromGenerated[Math.floor(Math.random() * fromGenerated.length)];
  }
  // セーフティ：到達しないはずだが、全部使い切ったら全体からランダム
  const all = [...themes, ...generatedThemes];
  return all[Math.floor(Math.random() * all.length)];
}

function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
  document.getElementById('status-text').textContent = text;
}

function updateStatus() {
  const count = usedHistory.length;
  const msg = count === 0
    ? `準備完了 — 何度でも新しいテーマが出ます`
    : `スプレッドシートと連携済み — ${count}テーマ使用済み`;
  setStatus('ok', msg);
}

async function gasGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  if (!res.ok) throw new Error('network error');
  return res.json();
}

async function gasPost(data) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error('network error');
  return res.json();
}

// ===== チーム管理 =====
async function loadTeams() {
  try {
    const data = await gasGet({ action: 'getTeams' });
    const teams = data.teams || [];
    const select = document.getElementById('teamSelect');
    const others = teams.filter(t => t !== '開発').sort();
    const allTeams = ['開発', ...others];
    select.innerHTML = allTeams.map(t =>
      `<option value="${t}"${t === currentTeam ? ' selected' : ''}>${t}</option>`
    ).join('');
  } catch(e) {}
}

  document.getElementById('useBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('copybtn').style.display = 'none';
  document.getElementById('spinBtn').style.display = 'inline-block';
  hideRoulette();
  loadFromCache(currentTeam);
  const sb = document.getElementById('spinBtn');
  sb.disabled = false;
  sb.textContent = 'ガチャを回す';
  updateStatus();
  renderUsed();
  loadMembers();
  loadUsed();
}

function toggleNewTeam() {
  const bar = document.getElementById('newTeamBar');
  const input = document.getElementById('newTeamInput');
  document.getElementById('renameTeamBar').style.display = 'none';
  if (bar.style.display === 'none') {
    bar.style.display = 'flex'; input.value = ''; input.focus();
  } else {
    bar.style.display = 'none';
  }
}

function toggleRenameTeam() {
  const bar = document.getElementById('renameTeamBar');
  const input = document.getElementById('renameTeamInput');
  document.getElementById('newTeamBar').style.display = 'none';
  if (bar.style.display === 'none') {
    bar.style.display = 'flex'; input.value = currentTeam; input.select(); input.focus();
  } else {
    bar.style.display = 'none';
  }
}

async function confirmRenameTeam() {
  const input = document.getElementById('renameTeamInput');
  const newName = input.value.trim();
  if (!newName) return;
  if (newName === currentTeam) { toggleRenameTeam(); return; }
  const select = document.getElementById('teamSelect');
  if (Array.from(select.options).some(o => o.value === newName)) {
    alert(`「${newName}」はすでに存在します。`); return;
  }
  setStatus('loading', 'チーム名を変更中...');
  try {
    await gasPost({ action: 'renameTeam', oldName: currentTeam, newName });
    // localStorageのメンバーキーも移行
    const savedMembers = localStorage.getItem(`gacha_members_${currentTeam}`);
    if (savedMembers) {
      localStorage.setItem(`gacha_members_${newName}`, savedMembers);
      localStorage.removeItem(`gacha_members_${currentTeam}`);
    }
    const option = Array.from(select.options).find(o => o.value === currentTeam);
    if (option) { option.value = newName; option.textContent = newName; }
    currentTeam = newName;
    toggleRenameTeam();
    setStatus('ok', `「${newName}」に変更しました`);
  } catch(e) {
    setStatus('error', 'チーム名の変更に失敗しました');
  }
}

async function addNewTeam() {
  const input = document.getElementById('newTeamInput');
  const name = input.value.trim();
  if (!name) return;
  const select = document.getElementById('teamSelect');
  if (!Array.from(select.options).some(o => o.value === name)) {
    const option = document.createElement('option');
    option.value = name; option.textContent = name;
    select.appendChild(option);
  }
  select.value = name;
  toggleNewTeam();
  onTeamChange();
}

// ===== スプシ連携 =====
// 履歴のローカルキャッシュ（GASの立ち上がりが遅くても、前回の記録で即座に動けるようにする）
function saveCache(team) {
  try {
    localStorage.setItem(`gacha_used_${team}`, JSON.stringify(usedHistory));
    localStorage.setItem(`gacha_skip_${team}`, JSON.stringify([...skippedThemes]));
  } catch(e) {}
}
function loadFromCache(team) {
  try {
    const u = localStorage.getItem(`gacha_used_${team}`);
    usedHistory = u ? JSON.parse(u) : [];
    const s = localStorage.getItem(`gacha_skip_${team}`);
    skippedThemes = new Set(s ? JSON.parse(s) : []);
  } catch(e) {
    usedHistory = []; skippedThemes = new Set();
  }
}

async function loadUsed() {
  // 使用済み履歴とスキップ履歴を「並列」で取得（直列だとGASの立ち上がりで体感が遅くなるため）
  const team = currentTeam;
  const [usedRes, skipRes] = await Promise.allSettled([
    gasGet({ action: 'getUsed', team }),
    gasGet({ action: 'getSkipped', team }),
  ]);
  // 取得中にチームが切り替わっていたら反映しない
  if (team !== currentTeam) return;

  // 取得成功したものだけ反映。失敗したものはキャッシュの値を維持する（空で上書きしない）
  if (usedRes.status === 'fulfilled') {
    usedHistory = (usedRes.value.used || []).map(item =>
      typeof item === 'object' ? item : { id: item, category: '', theme: '' }
    );
  }
  if (skipRes.status === 'fulfilled') {
    skippedThemes = new Set((skipRes.value.skipped || []).map(s => typeof s === 'object' ? s.theme : s));
  }
  if (usedRes.status === 'rejected' && skipRes.status === 'rejected') {
    setStatus('error', '接続エラー — 前回の記録で動作中');
  } else {
    // 取得できた最新の状態をキャッシュに保存
    saveCache(team);
  }
  updateStatus();
  const btn = document.getElementById('spinBtn');
  btn.disabled = false; btn.textContent = 'ガチャを回す';
  renderUsed();
}

// ===== ガチャ本体 =====
function spin() {
  const btn = document.getElementById('spinBtn');
  btn.style.display = 'inline-block';
  document.getElementById('useBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';

  const item = pickLocalTheme();
  updateStatus();

  current = item;
  btn.disabled = false;
  btn.textContent = 'ガチャを回す';

  const card = document.getElementById('card');
  card.style.opacity = '0'; card.style.transform = 'translateY(8px)';
  setTimeout(() => {
    card.innerHTML = `
      <div class="badge">${item.category}</div>
      <div class="card-theme">${item.theme}</div>
      <div class="card-desc">${item.desc}</div>
      <div class="card-hint">💡 ヒント: ${item.hint}</div>
    `;
    card.style.opacity = '1'; card.style.transform = 'translateY(0)';
  }, 180);

  btn.style.display = 'inline-block';
  document.getElementById('skipBtn').style.display = 'inline-block';
  const copybtn = document.getElementById('copybtn');
  copybtn.style.display = 'inline-block'; copybtn.textContent = 'コピー';
  copybtn.classList.remove('success');

  document.getElementById('rouletteSection').style.display = 'block';
  document.getElementById('wheelResult').textContent = '';
  document.getElementById('spinWheelBtn').disabled = presentMembers.length === 0;
  drawWheel();

  document.getElementById('useBtn').style.display = members.length > 0 ? 'none' : 'inline-block';
}

async function useTheme() {
  if (!current) return;
  const item = current;
  usedHistory.push({ id: item.id, category: item.category || '', theme: item.theme });
  saveCache(currentTeam);
  current = null;
  hideRoulette();
  document.getElementById('useBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('spinBtn').style.display = 'inline-block';
  setStatus('loading', 'スプレッドシートに記録中...');
  renderUsed();
  try {
    await gasPost({ action: 'addUsed', team: currentTeam, id: item.id, category: item.category || '', theme: item.theme });
    updateStatus();
  } catch(e) {
    setStatus('error', '記録に失敗しました（ローカルのみ更新）');
  }
}

async function skipTheme() {
  if (!current) return;
  const skipped = current;
  current = null;
  skippedThemes.add(skipped.theme);
  saveCache(currentTeam);
  document.getElementById('useBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  gasPost({ action: 'addSkipped', team: currentTeam, id: skipped.id, theme: skipped.theme }).catch(() => {});
  spin();
}

function hideRoulette() {
  document.getElementById('rouletteSection').style.display = 'none';
  document.getElementById('wheelResult').textContent = '';
}

function renderUsed() {
  // 表示なし（usedHistoryは重複除外用にメモリ上だけで保持）
}

function copyTheme() {
  if (!current) return;
  navigator.clipboard.writeText(current.theme).then(() => {
    const btn = document.getElementById('copybtn');
    btn.textContent = 'コピー完了!'; btn.classList.add('success');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('success'); }, 1800);
  });
}

// ===== ルーレット =====
function loadMembers() {
  const saved = localStorage.getItem(`gacha_members_${currentTeam}`);
  members = saved ? JSON.parse(saved) : [];
  presentMembers = [...members]; // デフォルト全員出席
  renderMemberToggles();
  renderMemberList();
  drawWheel();
}

function saveMembers() {
  localStorage.setItem(`gacha_members_${currentTeam}`, JSON.stringify(members));
}

function renderMemberToggles() {
  const container = document.getElementById('presentToggles');
  if (members.length === 0) {
    container.innerHTML = '<span class="member-empty-hint">↓ メンバー管理からメンバーを追加してください</span>';
    return;
  }
  container.innerHTML = members.map(m => {
    const isPresent = presentMembers.includes(m);
    // エスケープ処理（名前に ' が含まれる場合を考慮）
    const escaped = m.replace(/'/g, '&#39;');
    return `<button class="member-toggle-btn${isPresent ? ' present' : ''}" onclick="togglePresent('${escaped}')">${m}</button>`;
  }).join('');
}

function renderMemberList() {
  const list = document.getElementById('memberListItems');
  if (members.length === 0) {
    list.innerHTML = '<span style="font-size:12px;color:var(--text-hint);">メンバーがいません</span>';
    return;
  }
  list.innerHTML = members.map((m, i) => {
    const escaped = m.replace(/'/g, '&#39;');
    return `
      <div class="member-item">
        <span>${m}</span>
        <button onclick="removeMember('${escaped}')" title="削除">×</button>
      </div>`;
  }).join('');
}

function updateRouletteButtons() {
  document.getElementById('spinWheelBtn').disabled = presentMembers.length === 0;
  document.getElementById('useBtn').style.display = members.length > 0 ? 'none' : 'inline-block';
}

function togglePresent(name) {
  if (presentMembers.includes(name)) {
    presentMembers = presentMembers.filter(m => m !== name);
  } else {
    presentMembers.push(name);
  }
  renderMemberToggles();
  drawWheel();
  updateRouletteButtons();
}

function addMember() {
  const input = document.getElementById('memberAddInput');
  const name = input.value.trim();
  if (!name || members.includes(name)) return;
  members.push(name);
  presentMembers.push(name);
  saveMembers();
  renderMemberToggles();
  renderMemberList();
  drawWheel();
  updateRouletteButtons();
  input.value = '';
  input.focus();
}

function removeMember(name) {
  members = members.filter(m => m !== name);
  presentMembers = presentMembers.filter(m => m !== name);
  saveMembers();
  renderMemberToggles();
  renderMemberList();
  drawWheel();
}

function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = cx - 4;
  const n = presentMembers.length;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (n === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = '#e8e5e0';
    ctx.fill();
    ctx.fillStyle = '#a09d99';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('メンバーを追加してね', cx, cy);
    return;
  }

  const segAngle = (Math.PI * 2) / n;
  for (let i = 0; i < n; i++) {
    const start = wheelAngle + i * segAngle;
    const end = start + segAngle;

    // セグメント
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 名前テキスト
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + segAngle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffffff';
    const fontSize = Math.max(10, Math.min(15, Math.floor(180 / n)));
    ctx.font = `bold ${fontSize}px 'Noto Sans JP', sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 3;
    const maxLen = 5;
    const label = presentMembers[i].length > maxLen
      ? presentMembers[i].slice(0, maxLen) + '…'
      : presentMembers[i];
    ctx.fillText(label, radius - 10, fontSize * 0.4);
    ctx.restore();
  }

  // 中心の白丸
  ctx.beginPath();
  ctx.arc(cx, cy, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 4;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function spinWheel() {
  if (isSpinning || presentMembers.length === 0) return;
  isSpinning = true;
  document.getElementById('spinWheelBtn').disabled = true;
  document.getElementById('wheelResult').textContent = '';

  const n = presentMembers.length;
  const winnerIdx = Math.floor(Math.random() * n);
  const segAngle = (Math.PI * 2) / n;

  // ポインタ（上 = -π/2）に winner セグメントの中心を合わせる
  const winnerCenter = winnerIdx * segAngle + segAngle / 2;
  const targetAngle = -Math.PI / 2 - winnerCenter;
  const delta = ((targetAngle - wheelAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const totalRotation = delta + 6 * Math.PI * 2; // 6回転以上

  const startAngle = wheelAngle;
  const duration = 4000;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    wheelAngle = startAngle + totalRotation * eased;
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      wheelAngle = (startAngle + totalRotation) % (Math.PI * 2);
      isSpinning = false;
      document.getElementById('spinWheelBtn').disabled = false;

      // 結果表示
      const winner = presentMembers[winnerIdx];
      document.getElementById('wheelResult').textContent = `🎉 ${winner} さんから！`;

      // テーマを利用済みとして記録
      recordUsedFromRoulette();
    }
  }
  requestAnimationFrame(animate);
}

async function recordUsedFromRoulette() {
  if (!current) return;
  const item = current;
  usedHistory.push({ id: item.id, category: item.category || '', theme: item.theme });
  saveCache(currentTeam);
  current = null;

  // ルーレット結果は残したまま、ガチャボタンを戻す
  document.getElementById('useBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('spinBtn').style.display = 'inline-block';

  setStatus('loading', 'スプレッドシートに記録中...');
  renderUsed();
  try {
    await gasPost({ action: 'addUsed', team: currentTeam, id: item.id, category: item.category || '', theme: item.theme });
    updateStatus();
  } catch(e) {
    setStatus('error', '記録に失敗しました（ローカルのみ更新）');
  }
}

// ===== イベント・初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('newTeamInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addNewTeam();
    if (e.key === 'Escape') toggleNewTeam();
  });
  document.getElementById('renameTeamInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') confirmRenameTeam();
    if (e.key === 'Escape') toggleRenameTeam();
  });
  document.getElementById('memberAddInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addMember();
  });
});

async function init() {
  loadMembers(); // localStorageから同期的に読む
  // 前回の履歴をローカルキャッシュから即座に復元（GASの立ち上がり待ちをなくす）。
  loadFromCache(currentTeam);
  // 先にガチャを回せるようにする（GASの立ち上がりが遅くても待たせない）。
  // 履歴（使用済み・スキップ）はバックグラウンドで最新化し、揃い次第 重複除外に反映する。
  const btn = document.getElementById('spinBtn');
  btn.disabled = false; btn.textContent = 'ガチャを回す';
  updateStatus();   // キャッシュ件数で「連携済み」を即表示
  renderUsed();
  loadTeams();   // チーム一覧（バックグラウンド）
  loadUsed();    // 使用済み・スキップ履歴（バックグラウンド）
}
init();
</script>
